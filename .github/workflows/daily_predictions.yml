name: MLB Daily Bet Predictions

on:
  schedule:
    # Runs every day at 12:00 PM ET (16:00 UTC) — after DK posts morning lines
    - cron: "0 16 * * *"
  workflow_dispatch:   # also allow manual trigger

permissions:
  contents: write      # needed to commit prediction files back to repo

jobs:
  predict:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Update power ratings
        run: python update_ratings.py

      - name: Run prediction engine
        env:
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
        run: python predictor.py

      - name: Commit predictions & ratings
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "🤖 Daily MLB predictions [skip ci]"
          file_pattern: "predictions/*.json data/power_ratings.json logs/*.log"
